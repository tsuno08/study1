name: OpenHands

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  run-openhands:
    if: github.event.label.name == 'fix-me'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run OpenHands
        uses: All-Hands-AI/OpenHands@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}