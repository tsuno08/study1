name: Joke

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  joke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate joke
        id: joke
        run: |
          import requests
          import os

          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          PR_NUMBER = os.environ["GITHUB_PR_NUMBER"]
          REPO = os.environ["GITHUB_REPOSITORY"]

          def get_joke():
            try:
              response = requests.get("https://v2.jokeapi.dev/joke/Programming,Christmas?blacklistFlags=nsfw,racist,sexist,explicit&safe-mode")
              response.raise_for_status()
              joke_data = response.json()
              if joke_data["type"] == "single":
                return joke_data["joke"]
              else:
                return f"{joke_data['setup']} \n {joke_data['delivery']}"
            except requests.exceptions.RequestException as e:
              return f"Failed to fetch joke: {e}"

          joke = get_joke()
          print(f"::set-output name=joke::{joke}")

      - name: Post joke as comment
        run: |
          import requests
          import os
          import json

          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          PR_NUMBER = os.environ["GITHUB_PR_NUMBER"]
          REPO = os.environ["GITHUB_REPOSITORY"]
          JOKE = '${{ steps.joke.outputs.joke }}'

          url = f"https://api.github.com/repos/{REPO}/issues/{PR_NUMBER}/comments"
          headers = {
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }
          data = {
              "body": f"Here's a joke for you:\n\n{JOKE}"
          }
          response = requests.post(url, headers=headers, data=json.dumps(data))
          response.raise_for_status()
          print("Joke posted successfully!")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}